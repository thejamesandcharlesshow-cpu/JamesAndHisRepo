name: Build Repo

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dpkg-dev
        run: |
          sudo apt update
          sudo apt install -y dpkg-dev

      - name: Generate Packages
        run: |
          mkdir -p debs
          dpkg-scanpackages debs /dev/null > Packages
          gzip -kf Packages

      - name: Generate Release
        run: |
          cat > Release <<EOF
          Origin: JamesAndHisRepo
          Label: JamesAndHisRepo
          Suite: stable
          Version: 1.0
          Codename: ios
          Architectures: iphoneos-arm iphoneos-arm64
          Components: main
          Description: Personal Cydia Repository
          EOF

      - name: Commit updated repo files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Packages Packages.gz Release
          git diff --cached --quiet || git commit -m "Update Packages"
          git push
